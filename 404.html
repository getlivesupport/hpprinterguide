<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Redirecting...</title>

<meta name="robots" content="noindex,nofollow">

<link rel="canonical" href="https://getlivesupport.github.io/hpprinterguide/">

<meta http-equiv="refresh" content="0;url=https://getlivesupport.github.io/hpprinterguide/">

<style>

html,body{
height:100%;
margin:0;
font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
background:#ffffff;
display:flex;
align-items:center;
justify-content:center;
color:#1f2937;
}

.loader{
width:52px;
height:52px;
border:5px solid #ececec;
border-top:5px solid #c89a3d;
border-radius:50%;
animation:spin .7s linear infinite;
margin:auto;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

.wrapper{
text-align:center;
padding:30px;
max-width:600px;
}

h1{
margin:25px 0 10px;
font-size:30px;
}

p{
color:#555;
}

</style>

<script>

const HOME="https://getlivesupport.github.io/hpprinterguide/";

// Preserve the requested path for analytics/debugging.
const requested=encodeURIComponent(location.pathname+location.search+location.hash);

// Immediate redirect.
window.location.replace(HOME+"?from="+requested);

</script>

</head>

<body>

<div class="wrapper">

<div class="loader"></div>

<h1>Redirecting...</h1>

<p>Please wait while we take you to the homepage.</p>

<noscript>

<meta http-equiv="refresh" content="0;url=https://getlivesupport.github.io/hpprinterguide/">

<p>

<a href="https://getlivesupport.github.io/hpprinterguide/">
Continue to Homepage
</a>

</p>

</noscript>

</div>

</body>
</html>
